# Docker Compose for Umwero Handwriting OCR System
# Production-ready configuration with all services

version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: umwero-postgres
    environment:
      POSTGRES_DB: umwero_ocr
      POSTGRES_USER: umwero_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-umwero_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - umwero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umwero_user -d umwero_ocr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: umwero-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - umwero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── OCR Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: umwero-backend
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://umwero_user:${POSTGRES_PASSWORD:-umwero_secure_password}@postgres:5432/umwero_ocr
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      CACHE_DEFAULT_TTL: 3600
      CACHE_REFERENCE_TTL: 86400
      CACHE_FEATURE_TTL: 43200
      
      # Application Configuration
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      WORKERS: 2
      
      # Font Configuration
      UMWERO_FONT_PATH: /app/fonts/umwero.ttf
      
      # Security
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://yourdomain.com}
      
      # Performance
      MAX_REQUEST_SIZE: 10485760  # 10MB
      REQUEST_TIMEOUT: 30
      
      # ML Pipeline
      ML_EXPORT_DIR: /app/ml_exports
      DATASET_STORAGE_ROOT: /app/data/ocr_dataset
    volumes:
      - ocr_data:/app/data
      - ml_exports:/app/ml_exports
      - ./fonts:/app/fonts:ro
    ports:
      - "8000:8000"
    networks:
      - umwero-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend (Optional - for development) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umwero-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - umwero-network
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - frontend  # Only start with --profile frontend

  # ─── Nginx Reverse Proxy (Production) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: umwero-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - umwero-network
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - production  # Only start with --profile production

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  umwero-network:
    driver: bridge
    name: umwero-network

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: umwero-postgres-data
  redis_data:
    name: umwero-redis-data
  ocr_data:
    name: umwero-ocr-data
  ml_exports:
    name: umwero-ml-exports