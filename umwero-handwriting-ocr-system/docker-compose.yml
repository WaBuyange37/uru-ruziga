version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: umwero-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umwero-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - UMWERO_FONT_PATH=/app/fonts/umwero.ttf
      - CACHE_DEFAULT_TTL=3600
      - CACHE_REFERENCE_TTL=86400
      - CACHE_FEATURE_TTL=43200
    volumes:
      - ./backend:/app
      - ./fonts:/app/fonts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
    driver: local